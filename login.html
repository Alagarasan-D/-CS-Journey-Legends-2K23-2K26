<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
}
body {
  background: var(--dark);
  font-family: 'Cormorant Garamond', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
  position: relative;
}

/* Background */
#bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, #0a0a3e44 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, #1a0a0044 0%, transparent 60%),
    radial-gradient(ellipse at 50% 80%, #00102044 0%, transparent 60%),
    #04040f;
  z-index: 0;
}

canvas#stars {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* Floating particles */
.fp {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  animation: fpRise linear infinite;
}

@keyframes fpRise {
  0% { transform: translateY(105vh); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Main Card */
#card {
  position: relative;
  z-index: 10;
  background: linear-gradient(145deg, rgba(13, 13, 36, 0.9), rgba(26, 26, 56, 0.9));
  border: 1px solid rgba(255, 215, 0, 0.2);
  border-radius: 24px;
  padding: clamp(24px, 6vw, 50px) clamp(20px, 5vw, 60px);
  width: min(480px, 100%);
  max-width: 480px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 
    0 0 60px rgba(255, 215, 0, 0.08),
    0 0 120px rgba(0, 212, 255, 0.06),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  animation: cardIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  margin: 16px;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Decorative elements */
.card::before,
.card::after {
  content: '✦';
  position: absolute;
  top: 20px;
  color: rgba(255, 215, 0, 0.2);
  font-size: 1rem;
}

.card::before {
  left: 20px;
}

.card::after {
  right: 20px;
}

/* Header */
.card-badge {
  font-family: 'Orbitron', monospace;
  font-size: clamp(0.55rem, 2vw, 0.65rem);
  letter-spacing: 4px;
  color: var(--teal);
  text-align: center;
  margin-bottom: 8px;
  opacity: 0.8;
  word-break: keep-all;
}

.card-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(1.2rem, 5vw, 1.8rem);
  text-align: center;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #ffd700, #fff8dc, #ff8c00);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
  line-height: 1.3;
  padding: 0 8px;
}

.card-sub {

  color: rgba(255, 255, 255, 0.4);

  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 24px;
  word-break: keep-all;
}

.divider {
  width: 100%;
  height: 1px;
  margin: 0 auto 24px;
  background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.tab-btn {
  flex: 1;
  padding: 12px 8px;

.form-label {

<script>
// Toast notification function (non-module)
function showToast(message, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'show' + (isError ? ' error' : '');
  
  setTimeout(() => {
    toast.className = '';
  }, 3000);
}

// Stars animation
const canvas = document.getElementById('stars');
let ctx = canvas.getContext('2d');
let width, height;
let stars = [];

function initStars() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.5 + 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function animateStars() {
  if (!ctx) return;
  
  ctx.clearRect(0, 0, width, height);
  
  const time = Date.now() * 0.002;
  
  stars.forEach(star => {
    const brightness = 0.3 + 0.7 * Math.abs(Math.sin(time * star.speed + star.phase));
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 220, 150, ${brightness})`;
    ctx.fill();
  });
  
  requestAnimationFrame(animateStars);
}

// Floating particles
function createParticles() {
  const colors = ['#ffd700', '#7ecfff', '#ffaad4', '#00d4ff'];
  const particlesCount = 30;
  
  for (let i = 0; i < particlesCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'fp';
    
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = Math.random() * 4 + 2;
    const duration = Math.random() * 15 + 12;
    const delay = Math.random() * 12;
    const left = Math.random() * 100;
    
    particle.style.cssText = `
      left: ${left}vw;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      box-shadow: 0 0 6px ${color};
      animation-duration: ${duration}s;
      animation-delay: -${delay}s;
    `;
    
    document.body.appendChild(particle);
  }
}

// Handle resize
function handleResize() {
  initStars();
}

// Initialize everything
window.addEventListener('load', () => {
  initStars();
  animateStars();
  createParticles();
  
  // Start BGM
  const audio = document.getElementById('bgMusic');
  audio.volume = 0.3;
  audio.play().catch(() => {});
});

window.addEventListener('resize', () => {
  handleResize();
});

// Prevent form submission on enter key
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && document.getElementById('loginForm').style.display !== 'none') {
    e.preventDefault();
    doLogin();
  }
});

// Handle user interaction for audio
document.addEventListener('click', function initAudio() {
  const audio = document.getElementById('bgMusic');
  if (audio.paused) {
    audio.play().catch(() => {});
  }
}, { once: true });
</script>
