<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Book</title>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --page-width: min(45vw, 400px);
    --page-height: min(65vh, 560px);
    --bg-color: #020617;
  }

  @media (max-width: 600px) {
    :root {
      --page-width: 45vw;
      --page-height: 55vh;
    }
  }

  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
    font-family: 'Kalam', cursive;
    overflow: hidden;
  }

  .scene {
    width: calc(var(--page-width) * 2);
    height: var(--page-height);
    perspective: 1800px;
    transform-style: preserve-3d;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .book {
    position: relative;
    width: var(--page-width);
    height: var(--page-height);
    transform-style: preserve-3d;
    transform: rotateX(15deg) rotateY(0deg); 
    transition: transform 0.5s ease;
  }

  .scene:hover .book {
    transform: rotateX(10deg) rotateY(-5deg);
  }

  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
    background: #fff;
    border-radius: 2px 8px 8px 2px;
    box-shadow: 
      inset 0 0 15px rgba(0,0,0,0.1), 
      inset -10px 0 20px rgba(0,0,0,0.05), 
      1px 1px 5px rgba(0,0,0,0.2); 
  }

  .front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    overflow: hidden;
    border-radius: 2px 8px 8px 2px;
    background-color: #fff;
  }

  /* Internal Shadows to simulate bend / spine */
  .front::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 35px;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
    pointer-events: none;
    z-index: 10;
  }

  .back::before {
    content: '';
    position: absolute;
    top: 0;
    right: 0; /* right edge matches spine relative to flipped state */
    width: 35px;
    height: 100%;
    background: linear-gradient(to left, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
    pointer-events: none;
    z-index: 10;
  }

  .front { z-index: 2; }
  
  .back {
    transform: rotateY(180deg);
  }

  /* Seamless Spread System (One Image Across 2 Pages) */
  .img-spread {
    background-size: calc(var(--page-width) * 2) var(--page-height);
    background-repeat: no-repeat;
    background-color: #111;
  }
  .img-left {
    background-position: left center;
  }
  .img-right {
    background-position: right center;
  }

  /* Z-index layering for 11 pages */
  #page1 { z-index: 11; }
  #page2 { z-index: 10; }
  #page3 { z-index: 9; }
  #page4 { z-index: 8; }
  #page5 { z-index: 7; }
  #page6 { z-index: 6; }
  #page7 { z-index: 5; }
  #page8 { z-index: 4; }
  #page9 { z-index: 3; }
  #page10 { z-index: 2; }
  #page11 { z-index: 1; }

  /* Flipping classes */
  .flipped {
    transform: rotateY(-180deg);
  }

  /* Cover & Blank Styles */
  .cover, .blank {
    background: #0f172a;
    position: relative;
    overflow: hidden;
  }

  /* Cover Special Particles Effect */
  .cover::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 60px 80px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 120px 140px, #fff, rgba(0,0,0,0)),
      radial-gradient(1px 1px at 180px 200px, #fff, rgba(0,0,0,0));
    background-repeat: repeat;
    background-size: 200px 200px;
    animation: starsMove 20s linear infinite;
    opacity: 0.6;
    pointer-events: none;
  }

  @keyframes starsMove {
    from { background-position: 0 0; }
    to { background-position: -200px -200px; }
  }

  /* Intro text effects */
  .intro-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    color: #e2e8f0;
    text-align: center;
    padding: 10%;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    z-index: 2;
    position: relative;
  }

  .line {
    margin: 15px 0;
    opacity: 0;
    animation: slideUpFade 1s both;
  }
  .line1 { animation-delay: 0.5s; }
  .line2 { animation-delay: 2s; }
  .line3 { animation-delay: 4.5s; }

  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .line1 span {
    font-size: 2.8rem;
    font-weight: 900;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    display: inline-block;
    animation: floatBounce 4s infinite ease-in-out;
  }

  .line2 span {
    font-size: 1.5rem;
    color: #fff;
    letter-spacing: 4px;
    display: inline-block;
    border-right: 2px solid #fff;
    white-space: nowrap;
    overflow: hidden;
    max-width: 0;
    animation: typing 1.5s steps(12, end) forwards 2.5s, blinkCursor 0.7s infinite;
  }

  .line3 span {
    font-size: 2.5rem;
    font-family: 'Kalam', cursive;
    color: #fde047;
    text-shadow: 0 0 15px #eab308;
    display: inline-block;
    animation: blinkGlow 2s infinite ease-in-out;
  }

  @keyframes floatBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  @keyframes typing {
    from { max-width: 0; }
    to { max-width: 100%; }
  }

  @keyframes blinkCursor {
    from, to { border-color: transparent }
    50% { border-color: #fff; }
  }

  @keyframes blinkGlow {
    0%, 100% { opacity: 1; text-shadow: 0 0 10px #eab308; }
    50% { opacity: 0.7; text-shadow: none; }
  }

  /* Loading screen styles */
  .loading-wrapper {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    background: #0f172a;
    color: #10b981;
    font-family: 'Courier New', Courier, monospace;
    padding: 20px;
    box-sizing: border-box;
    width: 100%;
  }

  .progress-bar {
    width: 80%;
    height: 12px;
    background: #1e293b;
    border-radius: 6px;
    border: 1px solid #10b981;
    margin: 20px 0;
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
    overflow: hidden;
  }

  .progress {
    width: 10%;
    height: 100%;
    background: #10b981;
    border-radius: 4px;
    animation: pulseProgress 2s infinite alternate;
  }

  @keyframes pulseProgress {
    0% { opacity: 0.7; box-shadow: 0 0 5px #10b981; }
    100% { opacity: 1; box-shadow: 0 0 15px #10b981; }
  }

  .loading-text {
    font-size: 1.6rem;
    font-weight: bold;
    text-transform: uppercase;
  }

  .waiting-text {
    font-size: 1.2rem;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

</style>
</head>
<body>

<div class="scene">
  <div class="book" id="book">
    
    <!-- Page 1 (Cover + Image 1 Left) -->
    <div class="page" id="page1">
      <div class="front cover">
        <div class="intro-container">
           <div class="line line1"><span>MMCAS</span></div>
           <div class="line line2"><span>CS-2023-2026</span></div>
           <div class="line line3"><span>signing out</span></div>
        </div>
      </div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1774158751/1st_pongal_mass_rmjy0g.jpg');"></div>
    </div>

    <!-- Page 2 (Image 1 Right + Image 2 Left) -->
    <div class="page" id="page2">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1774158751/1st_pongal_mass_rmjy0g.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1774158751/1st_pongal_2_dcmrmv.jpg');"></div>
    </div>

    <!-- Page 3 (Image 2 Right + Image 3 Left) -->
    <div class="page" id="page3">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1774158751/1st_pongal_2_dcmrmv.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304356/IMG_20260110_112102_bvebrv.jpg');"></div>
    </div>

    <!-- Page 4 (Image 3 Right + Image 4 Left) -->
    <div class="page" id="page4">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304356/IMG_20260110_112102_bvebrv.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773302273/IMG-20250111-WA0135_h561f6.jpg');"></div>
    </div>

    <!-- Page 5 (Image 4 Right + Image 5 Left) -->
    <div class="page" id="page5">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773302273/IMG-20250111-WA0135_h561f6.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304273/IMG_20260110_105723_jqhrhd.jpg');"></div>
    </div>

    <!-- Page 6 (Image 5 Right + Image 6 Left) -->
    <div class="page" id="page6">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304273/IMG_20260110_105723_jqhrhd.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372107/IMG_20251013_135030_fgofou.jpg');"></div>
    </div>

    <!-- Page 7 (Image 6 Right + Image 7 Left) -->
    <div class="page" id="page7">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372107/IMG_20251013_135030_fgofou.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304657/IMG_20260110_113654_t4sca1.jpg');"></div>
    </div>

    <!-- Page 8 (Image 7 Right + Image 8 Left) -->
    <div class="page" id="page8">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1773304657/IMG_20260110_113654_t4sca1.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372098/IMG-20260110-WA0070_nl7fwu.jpg');"></div>
    </div>

    <!-- Page 9 (Image 8 Right + Image 9 Left) -->
    <div class="page" id="page9">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372098/IMG-20260110-WA0070_nl7fwu.jpg');"></div>
      <div class="back img-spread img-left" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372095/IMG-20250711-WA0041_b3nlm9.jpg');"></div>
    </div>

    <!-- Page 10 (Image 9 Right + Blank Left End) -->
    <div class="page" id="page10">
      <div class="front img-spread img-right" style="background-image: url('https://res.cloudinary.com/deatzzrsw/image/upload/v1775372095/IMG-20250711-WA0041_b3nlm9.jpg');"></div>
      <div class="back blank"></div>
    </div>

    <!-- Page 11 (Loading Screen Right + Back Cover) -->
    <div class="page" id="page11">
      <div class="front">
        <div class="loading-wrapper">
           <div class="loading-text">10% Complete</div>
           <div class="progress-bar">
              <div class="progress"></div>
           </div>
           <div class="waiting-text">and waiting...</div>
        </div>
      </div>
      <div class="back cover"></div>
    </div>

  </div>
</div>

<script>
  const flipDuration = 1500;
  let autoInterval;
  let currentPage = 1;
  const totalPages = 11;

  function setZIndexMidway(pageElem, newZ, delayMs) {
    setTimeout(() => {
      pageElem.style.zIndex = newZ;
    }, delayMs);
  }

  function nextPage() {
    if (currentPage < totalPages) {
      const page = document.getElementById(`page` + currentPage);
      page.classList.add('flipped');
      // When page goes to the left side, assign it a z-index based on its place in the left stack
      setZIndexMidway(page, currentPage, flipDuration / 2);
      currentPage++;
    }
  }

  function startAnimationSeq() {
    // Wait for the front cover cool effects to securely complete!
    // Total typing animations take ~6.5 seconds. Wait 8s for reading.
    setTimeout(() => {
      nextPage(); // Reveal Image 1 Full Spread
      
      // Auto flip to exactly reveal the next 2-page spreads
      autoInterval = setInterval(() => {
        if (currentPage < totalPages) {
           nextPage();
        } else {
           clearInterval(autoInterval); // stop completely at loading screen!
        }
      }, 4500); 
    }, 8000); 
  }

  // Ensures everything starts perfectly formatted
  window.onload = startAnimationSeq;
</script>

</body>
</html>
