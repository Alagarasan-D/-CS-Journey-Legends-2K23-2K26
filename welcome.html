<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;background:#000;}
body{font-family:'Cormorant Garamond',serif;display:flex;align-items:center;justify-content:center;}

canvas#bg{position:fixed;inset:0;z-index:0;}

/* ── PHASE 1: Name reveal ── */
#phase1{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
  animation:ph1Out 0.8s ease 3.2s forwards;
}
@keyframes ph1Out{to{opacity:0;transform:scale(1.05);pointer-events:none;}}

.welcome-small{
  font-family:'Orbitron',sans-serif;font-size:clamp(0.7rem,2vw,0.9rem);
  letter-spacing:8px;color:rgba(255,215,0,0.6);
  animation:fadeUp 0.8s ease 0.3s both;
}
.welcome-name{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(2rem,6vw,4.5rem);
  background:linear-gradient(135deg,#ffd700,#fff8dc,#ff8c00,#ffd700);
  background-size:300%;
  background-clip:text;              
  -webkit-background-clip:text;      
  color:transparent;                 
  -webkit-text-fill-color:transparent;
  animation:fadeUp 1s ease 0.6s both, shimmer 2.5s linear 1s infinite;
  filter:drop-shadow(0 0 30px #ffd70066);
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}

.welcome-dept{
  font-style:italic;color:rgba(255,255,255,0.45);
  font-size:clamp(0.9rem,2.5vw,1.2rem);letter-spacing:3px;
  animation:fadeUp 1s ease 1s both;
}

/* Heart pulse */
.heart{
  font-size:3rem;
  animation:heartbeat 0.8s ease 1.5s infinite;
  opacity:0;animation-fill-mode:both;
}
.heart-wrap{animation:fadeUp 0.5s ease 1.3s both;}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* ── PHASE 2: Student photo (Individual) ── */
#phase2{
  position:fixed;inset:0;z-index:11;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px; opacity:0; pointer-events:none;
  animation:ph2In 0.8s ease 3.5s forwards, ph2Out 0.8s ease 7s forwards;
}
@keyframes ph2In{to{opacity:1;pointer-events:auto;}}
@keyframes ph2Out{to{opacity:0;pointer-events:none;}}

.photo-frame{
  width:min(220px,55vw);height:min(220px,55vw);
  border-radius:50%;
  border:3px solid rgba(255,215,0,0.5);
  box-shadow:0 0 40px rgba(255,215,0,0.3),0 0 80px rgba(255,215,0,0.1);
  overflow:hidden;position:relative;
  background:linear-gradient(135deg,#0d0d24,#1a1a38);
  display:flex;align-items:center;justify-content:center;
}
.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.photo-frame img.active{
  display:block;
}
.photo-placeholder{
  font-size:4rem;
  opacity:0.4;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}
.photo-frame .placeholder-active{
  display:flex;
}
.photo-name{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3vw,1.6rem);
  color:#ffd700;letter-spacing:4px;
  text-shadow:0 0 20px #ffd70066;
}
.photo-tag{
  font-style:italic;color:rgba(255,255,255,0.4);
  font-size:0.9rem;letter-spacing:2px;
}

/* ── PHASE 3: Group photo ── */
#phase3{
  position:fixed;inset:0;z-index:12;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px; opacity:0; pointer-events:none;
  animation:ph2In 1s ease 7.3s forwards;
}
.group-frame{
  width:100vw;
  height:100vh;
  border-radius:0;
  border:none;
  box-shadow:none;
  overflow:hidden;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}
.group-frame img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  display:none;
}
.group-frame img.active{
  display:block;
}
.group-placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  color:rgba(255,255,255,0.3);
}
.group-title{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3vw,1.8rem);
  color:#ffd700;letter-spacing:4px;
  text-shadow:0 0 20px #ffd70066;
}
.group-sub{
  font-style:italic;color:rgba(255,255,255,0.4);
  font-size:0.9rem;letter-spacing:2px;
}

/* ── TRANSITION ── */
#enterBtn{
  padding:14px 40px;margin-top:4px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  border:none;border-radius:50px;
  font-family:'Cinzel Decorative',cursive;
  font-size:0.9rem;letter-spacing:3px;color:#000;
  cursor:pointer;box-shadow:0 0 30px #ffd70044;
  transition:all .3s;
  z-index:13;
  position:relative;
}
#enterBtn:hover{transform:scale(1.05);box-shadow:0 0 50px #ffd700aa;}

/* Flash */
#flash{
  position:fixed;inset:0;background:#000;
  z-index:999;opacity:0;pointer-events:none;
  transition:opacity 0.6s;
}
#flash.active{opacity:1;}

/* Petals/particles */
.petal{
  position:fixed;border-radius:50% 0 50% 0;
  pointer-events:none;z-index:5;
  animation:petalFall linear infinite;
}
@keyframes petalFall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:0;}
  10%{opacity:0.8;}90%{opacity:0.8;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(25px);}
  to{opacity:1;transform:translateY(0);}
}

/* Responsive */
@media(max-width:480px){
  .welcome-name{font-size:2rem;}
  .photo-frame{width:170px;height:170px;}
}
</style>

let t=0;

  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='#04040f';ctx.fillRect(0,0,c.width,c.height);

  g.addColorStop(0,'rgba(10,10,40,0.6)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);
  t+=0.01;
  stars.forEach(s=>{
    const o=0.2+0.7*Math.abs(Math.sin(t*s.spd+s.phase));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,225,100,${o})`;ctx.fill();
  });
  requestAnimationFrame(loop);
})();
