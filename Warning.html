<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS-Journey-Legends-2K23-2K26 Batch </title>
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/deatzzrsw/image/upload/v1773304356/IMG_20260110_112102_bvebrv.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #ffd700;
  --gold2: #ff8c00;
  --blue: #0a0a2e;
  --teal: #00d4ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: #000;
  font-family: 'Cormorant Garamond', serif;
  display: flex; align-items: center; justify-content: center;
}

/* Animated gradient BG */
#bg {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #000005, #0a0a2e, #000510, #1a0505, #000);
  background-size: 400% 400%;
  animation: bgShift 7s ease forwards;
  z-index: 0;
}
@keyframes bgShift {
  0%   { background-position: 0% 0%; filter: brightness(0.3); }
  30%  { background-position: 50% 50%; filter: brightness(0.7); }
  70%  { background-position: 100% 100%; filter: brightness(1); }
  100% { background-position: 60% 40%; filter: brightness(1.1); }
}

/* Stars */
#stars-canvas { position:fixed; inset:0; z-index:1; pointer-events:none; }

/* Bubbles */
.bubble {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,
    rgba(255,255,255,0.35) 0%,
    rgba(255,255,255,0.08) 40%,
    rgba(0,212,255,0.05) 70%,
    transparent 100%);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    inset 0 0 20px rgba(255,255,255,0.1),
    0 0 30px rgba(0,212,255,0.08);
  backdrop-filter: blur(2px);
  animation: bubbleFloat linear infinite;
  pointer-events: none; z-index: 2;
}
@keyframes bubbleFloat {
  0%   { transform: translateY(110vh) scale(0) rotate(0deg); opacity:0; }
  5%   { opacity: 1; }
  95%  { opacity: 0.7; }
  100% { transform: translateY(-15vh) scale(1) rotate(360deg); opacity:0; }
}

/* Sparks */
.spark {
  position: fixed;
  width: 3px; height: 3px;
  border-radius: 50%;
  pointer-events: none; z-index: 2;
  animation: sparkFly linear forwards;
}
@keyframes sparkFly {
  0%   { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; }
}

/* CENTER CONTENT */
#center {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; text-align: center;
  padding: 20px;
}

/* College name small */
#collegeName {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.75rem, 2vw, 1rem);
  letter-spacing: 6px;
  color: rgba(255,215,0,0.7);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.5s forwards;
}

/* Main title */
/* Import Font */
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap');

#mainTitle {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(1.4rem, 5vw, 3.5rem);
  font-weight: 900;
  letter-spacing: 4px;
  line-height: 1.3;

  background: linear-gradient(135deg, #ffd700, #fff8dc, #ff8c00, #ffd700);
  background-size: 300%;
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  -webkit-text-fill-color: transparent;

  animation: shimmerText 3s linear infinite, fadeUp 1s ease forwards;
  filter: drop-shadow(0 0 20px #ffd70088);
}

/* Shimmer Animation */
@keyframes shimmerText {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* Fade Up Animation */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Typewriter batch text */
#batchLine {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1rem, 3vw, 1.8rem);
  font-weight: 700;
  letter-spacing: 8px;
  color: #00d4ff;
  text-shadow: 0 0 20px #00d4ffaa, 0 0 50px #00d4ff44;
  min-height: 2rem;
  opacity: 0;
  animation: fadeUp 0.5s ease 1.5s forwards;
}
#typeCursor {
  display: inline-block;
  width: 3px; height: 1.1em;
  background: #00d4ff;
  vertical-align: middle;
  margin-left: 3px;
  animation: blink 0.6s step-end infinite;
}
@keyframes blink { 50%{opacity:0} }

/* Dept tag */
#deptTag {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.6);
  letter-spacing: 3px;
  opacity: 0;
  animation: fadeUp 0.8s ease 2s forwards;
}

/* GLOW RING */
#glowRing {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center,
    rgba(255,215,0,0.0) 30%,
    rgba(255,215,0,0.12) 60%,
    rgba(255,140,0,0.08) 75%,
    transparent 100%);
  z-index: 3; pointer-events: none;
  opacity: 0;
  animation: glowPulse 2s ease 1.5s forwards;
}
@keyframes glowPulse {
  0%  { opacity:0; transform:scale(0.8); }
  50% { opacity:1; transform:scale(1.05); }
  100%{ opacity:0.6; transform:scale(1); }
}

/* PROGRESS BAR */
#progressWrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 4px; background: rgba(255,255,255,0.05);
  z-index: 20;
}
#progressBar {
  height: 100%;
  background: linear-gradient(90deg, #00d4ff, #ffd700, #ff8c00);
  width: 0%;
  animation: fillBar 7s linear forwards;
  box-shadow: 0 0 12px #ffd700;
}
@keyframes fillBar { 0%{width:0%} 100%{width:100%} }

/* Percent counter */
#percent {
  position: fixed; bottom: 14px; right: 20px;
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem; color: #ffd70099;
  z-index: 20;
}

/* Corner decorations */
.corner {
  position: fixed; width: 60px; height: 60px;
  z-index: 5; pointer-events: none;
  opacity: 0; animation: fadeIn 1s ease 0.5s forwards;
}
.corner.tl { top:20px; left:20px; border-top:2px solid #ffd70066; border-left:2px solid #ffd70066; }
.corner.tr { top:20px; right:20px; border-top:2px solid #ffd70066; border-right:2px solid #ffd70066; }
.corner.bl { bottom:20px; left:20px; border-bottom:2px solid #ffd70066; border-left:2px solid #ffd70066; }
.corner.br { bottom:20px; right:20px; border-bottom:2px solid #ffd70066; border-right:2px solid #ffd70066; }

/* Divider line */
#divider {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #ffd700, transparent);
  margin: 4px 0;
  animation: expandLine 1.2s ease 1s forwards;
}
@keyframes expandLine { to { width: min(400px, 80vw); } }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn { to { opacity:1; } }

/* FLASH transition out */
#flash {
  position: fixed; inset: 0;
  background: #fff; z-index: 100;
  opacity: 0; pointer-events: none;
  animation: flashOut 0.6s ease 6.7s forwards;
}
@keyframes flashOut {
  0%  { opacity:0; }
  40% { opacity:1; }
  100%{ opacity:1; }
}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="stars-canvas"></canvas>
<div id="glowRing"></div>

<!-- Corner brackets -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="center">
  <div id="collegeName">Department of Computer Science</div>
  <div id="divider"></div>
  <div id="mainTitle">CS-Journey-Legends-2K23-2K26</div>
  <div id="batchLine"><span id="typeText"></span><span id="typeCursor"></span></div>
  <div id="deptTag">✦ &nbsp; Where Memories Live Forever &nbsp; ✦</div>
</div>

<div id="progressWrap"><div id="progressBar"></div></div>
<div id="percent">0%</div>
<div id="flash"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://res.cloudinary.com/dilsx2np3/video/upload/q_auto/f_auto/v1776585497/welcome2_wliltu.mp3" type="audio/mpeg">
</audio>

<script>
/* ── STARS ── */
const sc = document.getElementById('stars-canvas');
const ctx = sc.getContext('2d');
sc.width = innerWidth; sc.height = innerHeight;
const stars = Array.from({length:300}, ()=>({
  x:Math.random()*sc.width, y:Math.random()*sc.height,
  r:Math.random()*1.4+0.2, phase:Math.random()*Math.PI*2, spd:Math.random()*0.5+0.1
}));
let t=0;
(function drawStars(){
  ctx.clearRect(0,0,sc.width,sc.height); t+=0.015;
  stars.forEach(s=>{
    const o=0.2+0.8*Math.abs(Math.sin(t*s.spd+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,230,100,${o})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
})();

/* ── BUBBLES ── */
function makeBubble(){
  const b=document.createElement('div'); b.className='bubble';
  const sz=30+Math.random()*120;
  b.style.cssText=`
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}vw;
    animation-duration:${8+Math.random()*10}s;
    animation-delay:${Math.random()*6}s;
  `;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(), 20000);
}
for(let i=0;i<18;i++) makeBubble();
setInterval(makeBubble, 800);

/* ── SPARKS ── */
function makeSpark(x,y){
  for(let i=0;i<8;i++){
    const s=document.createElement('div'); s.className='spark';
    const angle=Math.random()*Math.PI*2, dist=40+Math.random()*80;
    const cols=['#ffd700','#ff8c00','#00d4ff','#fff'];
    s.style.cssText=`
      left:${x}px; top:${y}px;
      background:${cols[~~(Math.random()*cols.length)]};
      --dx:${Math.cos(angle)*dist}px; --dy:${Math.sin(angle)*dist}px;
      animation-duration:${0.4+Math.random()*0.6}s;
      box-shadow:0 0 4px currentColor;
    `;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}
// random sparks
setInterval(()=>{
  makeSpark(Math.random()*innerWidth, Math.random()*innerHeight);
},400);

/* ── TYPEWRITER ── */
const typeEl = document.getElementById('typeText');
const msg = 'UNIQUE SHINERS';
let ti=0;
setTimeout(()=>{
  const iv=setInterval(()=>{
    typeEl.textContent=msg.slice(0,++ti);
    if(ti>=msg.length) clearInterval(iv);
  },120);
},1600);

/* ── PERCENT COUNTER ── */
const pct=document.getElementById('percent');
let p=0, start=Date.now();
(function countUp(){
  p=Math.min(100,Math.round((Date.now()-start)/70));
  pct.textContent=p+'%';
  if(p<100) requestAnimationFrame(countUp);
})();

/* ── REDIRECT after 7s ── */
setTimeout(()=>{ window.location.href='login.html'; }, 7000);

/* ── BACKGROUND MUSIC ── */
const bgMusic = document.getElementById('bgMusic');
if (bgMusic) {
  bgMusic.volume = 0.3;
  const playPromise = bgMusic.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {});
  }

  document.addEventListener('click', function startAudio() {
    if (bgMusic.paused) {
      bgMusic.play().catch(() => {});
    }
  }, { once: true });
}

window.addEventListener('resize',()=>{
  sc.width=innerWidth; sc.height=innerHeight;
});
</script>
<div class="footer-credit" style="position:fixed;bottom:15px;right:15px;z-index:1000;">

</div>
</body>
</html>
